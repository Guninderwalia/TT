# fly.toml app configuration file generated for tasktango on 2026-05-30T22:05:54+01:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'tasktango'
primary_region = 'bom'

[build]
  dockerfile = 'Dockerfile'

[env]
  NODE_ENV = 'production'
  OFFICE_TIMEZONE = 'Asia/Kolkata'
  USER_DATA_PATH = '/data'

[[mounts]]
  source = 'tasktango_data'
  destination = '/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
