<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#080E1C" />
    <meta name="description" content="Task Tango Pulse - Enterprise HR & CRM Desktop Application" />

    <!-- v4.7 — Progressive Web App ------------------------------------------ -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <link rel="icon" type="image/png" href="%PUBLIC_URL%/icon-512.png" />
    <link rel="shortcut icon" href="%PUBLIC_URL%/icon-512.png" />

    <!-- iOS Safari home-screen install: it ignores manifest.json icons + name,
         so spell everything out with apple-* tags as a fallback. -->
    <link rel="apple-touch-icon" sizes="180x180" href="%PUBLIC_URL%/icon-512.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Task Tango Pulse" />

    <!-- Windows tile -->
    <meta name="msapplication-TileColor" content="#080E1C" />
    <meta name="msapplication-TileImage" content="%PUBLIC_URL%/icon-512.png" />

    <title>Task Tango Pulse</title>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    <!--
      Web Electron Shim - polyfills window.electron when running in a browser.
      No-op when loaded inside the Electron desktop app (it detects existing window.electron).
      The version query string forces browsers to re-fetch when the shim's
      API surface changes; otherwise stale cached copies silently misbehave
      (e.g. signIn() called with no userId because an older shim didn't
      accept the argument).
    -->
    <script src="%PUBLIC_URL%/web-electron-shim.js?v=2.1.0"></script>
  </body>
</html>
